services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: his_app
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - his_network

  nginx:
    image: nginx:alpine
    container_name: his_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - his_network

  postgres:
    image: postgres:16-alpine
    container_name: his_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: his_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d his_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - his_network

volumes:
  postgres_data:

networks:
  his_network:
    driver: bridge